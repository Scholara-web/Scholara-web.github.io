<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Scholara — Tasks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--n950:#04091a;--n900:#070f24;--n800:#0c1a38;--n700:#112248;--gold:#c8a84b;--gl:#e2c87a;--gd:#8a6f2e;--teal:#4bbfcc;--td:#2a8a94;--tp:#f0ebdf;--ts:#a8b4c8;--tm:#5a6a82;--border:rgba(200,168,75,0.14);--bb:rgba(200,168,75,0.28);--card:rgba(12,26,56,0.75);--ok:#4bbf8a;--err:#e05c5c;--sw:230px}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--n950);color:var(--tp);min-height:100vh;display:flex;overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--gd);border-radius:2px}
.sidebar{width:var(--sw);flex-shrink:0;background:linear-gradient(180deg,var(--n800),var(--n900));border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.s-logo{padding:1.3rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;text-decoration:none}
.s-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gd));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--n900);flex-shrink:0}
.s-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--tp)}
.s-nav{flex:1;padding:.8rem .6rem;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.s-lbl{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);padding:.65rem 10px .2rem}
.s-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:.85rem;font-weight:500;color:var(--tm);transition:all .2s;border:1px solid transparent;background:none;width:100%;text-align:left;text-decoration:none}
.s-item:hover{background:rgba(255,255,255,.04);color:var(--ts)}
.s-item.active{background:rgba(200,168,75,.1);color:var(--gl);border-color:rgba(200,168,75,.15)}
.s-icon{font-size:.9rem;width:20px;text-align:center;flex-shrink:0}
.s-bot{padding:.6rem;border-top:1px solid var(--border)}
.u-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);margin-bottom:6px}
.u-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--td));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:var(--n900);overflow:hidden}
.u-av img{width:100%;height:100%;object-fit:cover}
.u-name{font-size:.78rem;font-weight:600;color:var(--tp)}.u-email{font-size:.66rem;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.so-btn{width:100%;padding:7px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--tm);font-family:'DM Sans',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s}
.so-btn:hover{border-color:var(--err);color:var(--err)}
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(4,9,26,.88);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40}
.t-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--tp)}
.t-date{font-size:.72rem;color:var(--tm);font-family:'DM Mono',monospace}
.content{padding:1.5rem;flex:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem;backdrop-filter:blur(12px);margin-bottom:1.2rem}
.c-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--tp);margin-bottom:.9rem;display:flex;align-items:center;gap:7px}
.inp{width:100%;padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--tp);outline:none;transition:border-color .2s}
.inp::placeholder{color:var(--tm)}.inp:focus{border-color:var(--gd)}
.sel{padding:8px 9px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.83rem;color:var(--ts);outline:none;cursor:pointer}
.sel option{background:var(--n800)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .22s;text-decoration:none;border:none}
.btn-g{background:linear-gradient(135deg,var(--gold),#a8892e);color:var(--n900);font-weight:600}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,168,75,.3)}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn-o{background:transparent;border:1px solid var(--bb);color:var(--ts)}
.btn-o:hover{border-color:var(--gd);color:var(--gl)}
.todo-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid var(--border);transition:all .2s;margin-bottom:5px}
.todo-item:hover{background:rgba(255,255,255,.06);border-color:var(--bb)}
.todo-item.done{opacity:.45}
.chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--bb);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk.on{background:var(--gold);border-color:var(--gold)}
.chk.on::after{content:'✓';font-size:.6rem;color:var(--n900);font-weight:700}
.todo-text{flex:1;font-size:.855rem;color:var(--ts)}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--tm)}
.badge{font-size:.62rem;font-weight:600;text-transform:uppercase;padding:2px 7px;border-radius:100px}
.bh{background:rgba(224,92,92,.12);color:#f08080;border:1px solid rgba(224,92,92,.2)}
.bm{background:rgba(200,168,75,.12);color:var(--gl);border:1px solid rgba(200,168,75,.2)}
.bl{background:rgba(75,191,204,.1);color:var(--teal);border:1px solid rgba(75,191,204,.2)}
.del-btn{background:none;border:none;color:var(--tm);cursor:pointer;font-size:.85rem;padding:2px 4px;opacity:0;transition:all .2s}
.todo-item:hover .del-btn{opacity:1}.del-btn:hover{color:var(--err)}
.empty{text-align:center;padding:2rem;color:var(--tm);font-size:.855rem}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>
<aside class="sidebar">
  <a href="index.html" class="s-logo"><div class="s-mark">S</div><span class="s-name">Scholara</span></a>
  <nav class="s-nav">
    <span class="s-lbl">Overview</span>
    <a href="dashboard.html" class="s-item"><span class="s-icon">🏠</span>Dashboard</a>
    <span class="s-lbl">Study Tools</span>
    <a href="tasks.html"     class="s-item active"><span class="s-icon">✅</span>Tasks</a>
    <a href="tracker.html"   class="s-item"><span class="s-icon">📚</span>Study Tracker</a>
    <a href="pomodoro.html"  class="s-item"><span class="s-icon">🍅</span>Pomodoro</a>
    <a href="stopwatch.html" class="s-item"><span class="s-icon">⏲️</span>Stopwatch</a>
    <a href="notes.html"     class="s-item"><span class="s-icon">📝</span>Notes</a>
    <span class="s-lbl">Insights</span>
    <a href="analytics.html" class="s-item"><span class="s-icon">📊</span>Analytics</a>
  </nav>
  <div class="s-bot">
    <div class="u-card"><div class="u-av" id="uav">?</div><div><div class="u-name" id="uname">...</div><div class="u-email" id="uemail">—</div></div></div>
    <button class="so-btn" id="sobtn">← Sign Out</button>
  </div>
</aside>
<div class="main">
  <header class="topbar"><div class="t-title">✅ Tasks</div><span class="t-date" id="tdate"></span></header>
  <div class="content">
    <div class="card">
      <div class="c-title">Add New Task</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <input class="inp" id="ti" placeholder="What do you need to do?" style="flex:2;min-width:180px" onkeydown="if(event.key==='Enter')addTask()"/>
        <select class="sel" id="tp"><option value="medium">🟡 Medium</option><option value="high">🔴 High</option><option value="low">🔵 Low</option></select>
        <select class="sel" id="ts2"><option value="">📖 Subject</option><option>Math</option><option>Science</option><option>Physics</option><option>Chemistry</option><option>Biology</option><option>English</option><option>History</option><option>CS</option><option>Other</option></select>
        <input class="inp" id="td" type="date" style="width:145px"/>
        <button class="btn btn-g" onclick="addTask()">+ Add</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-size:.78rem;color:var(--ts)">Progress</span>
        <span style="font-size:.78rem;color:var(--gl);font-family:'DM Mono',monospace" id="plbl">0 / 0</span>
      </div>
      <div style="height:5px;background:var(--n700);border-radius:3px;overflow:hidden">
        <div id="pfill" style="height:100%;background:linear-gradient(90deg,var(--gd),var(--gold));border-radius:3px;transition:width .5s;width:0%"></div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem">
        <button class="btn btn-sm btn-g" id="f-all"    onclick="setFilter('all',this)">All</button>
        <button class="btn btn-sm btn-o" id="f-active" onclick="setFilter('active',this)">Active</button>
        <button class="btn btn-sm btn-o" id="f-done"   onclick="setFilter('done',this)">Done</button>
        <button class="btn btn-sm btn-o" id="f-high"   onclick="setFilter('high',this)">🔴 High</button>
        <button class="btn btn-sm btn-o" id="f-medium" onclick="setFilter('medium',this)">🟡 Medium</button>
        <button class="btn btn-sm btn-o" id="f-low"    onclick="setFilter('low',this)">🔵 Low</button>
      </div>
      <div id="tlist"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAX2yhFyqaYdkwD63iEK7fQSw0_mH3yfPQ",
  authDomain: "scholara-f7c60.firebaseapp.com",
  projectId: "scholara-f7c60",
  storageBucket: "scholara-f7c60.firebasestorage.app",
  messagingSenderId: "467753876713",
  appId: "1:467753876713:web:2f0aeb3ce3933e5ace4478"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Enable offline persistence to handle network issues
enableIndexedDbPersistence(db).catch(err => {
  if (err.code == 'failed-precondition') {
    console.log('Multiple tabs open, persistence can only be enabled in one tab at a time.');
  } else if (err.code == 'unimplemented') {
    console.log('The current browser does not support all of the features required to enable persistence');
  }
});
let uid = null, todos = [], filter = 'all';

document.getElementById('tdate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'auth.html'; return; }
  uid = user.uid;
  const name = user.displayName || user.email.split('@')[0];
  document.getElementById('uname').textContent = name;
  document.getElementById('uemail').textContent = user.email;
  const av = document.getElementById('uav');
  if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}"/>`;
  else av.textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  await load();
});
document.getElementById('sobtn').onclick = async () => { await signOut(auth); window.location.href='auth.html'; };

async function load() {
  const snap = await getDocs(query(collection(db,'users',uid,'todos'), orderBy('createdAt','desc')));
  todos = snap.docs.map(d => ({...d.data(), id:d.id}));
  render();
}

window.addTask = async function() {
  const text = document.getElementById('ti').value.trim();
  if (!text || !uid) return;
  const data = { text, priority: document.getElementById('tp').value, subject: document.getElementById('ts2').value, due: document.getElementById('td').value, done: false, createdAt: serverTimestamp() };
  const ref = await addDoc(collection(db,'users',uid,'todos'), data);
  todos.unshift({...data, id:ref.id, createdAt:new Date()});
  document.getElementById('ti').value = '';
  render();
};

window.toggleTask = async function(id) {
  const t = todos.find(x=>x.id===id); if (!t) return;
  t.done = !t.done;
  await updateDoc(doc(db,'users',uid,'todos',id), {done:t.done});
  render();
};

window.deleteTask = async function(id) {
  if (!confirm('Delete this task?')) return;
  todos = todos.filter(t=>t.id!==id);
  await deleteDoc(doc(db,'users',uid,'todos',id));
  render();
};

window.setFilter = function(f, btn) {
  filter = f;
  document.querySelectorAll('[id^="f-"]').forEach(b => { b.className = b.className.replace('btn-g','btn-o'); });
  btn.className = btn.className.replace('btn-o','btn-g');
  render();
};

function render() {
  const done = todos.filter(t=>t.done).length, total = todos.length;
  document.getElementById('plbl').textContent = `${done} / ${total}`;
  document.getElementById('pfill').style.width = total ? `${Math.round(done/total*100)}%` : '0%';
  let list = todos;
  if (filter==='active') list = todos.filter(t=>!t.done);
  else if (filter==='done') list = todos.filter(t=>t.done);
  else if (['high','medium','low'].includes(filter)) list = todos.filter(t=>t.priority===filter);
  const el = document.getElementById('tlist');
  if (!list.length) { el.innerHTML='<div class="empty">No tasks here!</div>'; return; }
  el.innerHTML = list.map(t => `<div class="todo-item ${t.done?'done':''}">
    <div class="chk ${t.done?'on':''}" onclick="toggleTask('${t.id}')"></div>
    <span class="todo-text">${t.text}${t.subject?` <span style="font-size:.7rem;color:var(--tm)">· ${t.subject}</span>`:''}</span>
    ${t.due?`<span style="font-size:.7rem;color:var(--tm)">📅 ${t.due}</span>`:''}
    <span class="badge ${t.priority==='high'?'bh':t.priority==='low'?'bl':'bm'}">${t.priority||'medium'}</span>
    <button class="del-btn" onclick="deleteTask('${t.id}')">✕</button>
  </div>`).join('');
}
</script>
</body></html>
