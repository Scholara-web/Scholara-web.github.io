<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Scholara — Notes</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--n950:#04091a;--n900:#070f24;--n800:#0c1a38;--n700:#112248;--gold:#c8a84b;--gl:#e2c87a;--gd:#8a6f2e;--teal:#4bbfcc;--td:#2a8a94;--tp:#f0ebdf;--ts:#a8b4c8;--tm:#5a6a82;--border:rgba(200,168,75,0.14);--bb:rgba(200,168,75,0.28);--card:rgba(12,26,56,0.75);--ok:#4bbf8a;--err:#e05c5c;--sw:230px}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--n950);color:var(--tp);min-height:100vh;display:flex;overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--gd);border-radius:2px}
.sidebar{width:var(--sw);flex-shrink:0;background:linear-gradient(180deg,var(--n800),var(--n900));border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.s-logo{padding:1.3rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;text-decoration:none}
.s-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gd));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--n900);flex-shrink:0}
.s-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--tp)}
.s-nav{flex:1;padding:.8rem .6rem;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.s-lbl{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);padding:.65rem 10px .2rem}
.s-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:.85rem;font-weight:500;color:var(--tm);transition:all .2s;border:1px solid transparent;background:none;width:100%;text-align:left;text-decoration:none}
.s-item:hover{background:rgba(255,255,255,.04);color:var(--ts)}
.s-item.active{background:rgba(200,168,75,.1);color:var(--gl);border-color:rgba(200,168,75,.15)}
.s-icon{font-size:.9rem;width:20px;text-align:center;flex-shrink:0}
.s-bot{padding:.6rem;border-top:1px solid var(--border)}
.u-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);margin-bottom:6px}
.u-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--td));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:var(--n900);overflow:hidden}
.u-av img{width:100%;height:100%;object-fit:cover}
.u-name{font-size:.78rem;font-weight:600;color:var(--tp)}.u-email{font-size:.66rem;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.so-btn{width:100%;padding:7px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--tm);font-family:'DM Sans',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s}
.so-btn:hover{border-color:var(--err);color:var(--err)}
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(4,9,26,.88);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40}
.t-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--tp)}
.t-date{font-size:.72rem;color:var(--tm);font-family:'DM Mono',monospace}
.content{padding:1.5rem;flex:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem;backdrop-filter:blur(12px)}
.c-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--tp);margin-bottom:.9rem;display:flex;align-items:center;gap:7px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem}
.mb{margin-bottom:1.2rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem}
.s-lbl2{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);margin-bottom:.25rem}
.s-val{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:700;color:var(--gl);line-height:1;margin-bottom:.18rem}
.s-sub{font-size:.7rem;color:var(--ts)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .22s;text-decoration:none;border:none}
.btn-g{background:linear-gradient(135deg,var(--gold),#a8892e);color:var(--n900);font-weight:600}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,168,75,.3)}
.btn-o{background:transparent;border:1px solid var(--bb);color:var(--ts)}
.btn-o:hover{border-color:var(--gd);color:var(--gl)}
.btn-t{background:rgba(75,191,204,.1);border:1px solid rgba(75,191,204,.25);color:var(--teal)}
.btn-t:hover{background:rgba(75,191,204,.18)}
.btn-r{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.2);color:#f08080}
.btn-r:hover{background:rgba(224,92,92,.18)}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn-lg{padding:11px 26px;font-size:.95rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.inp{width:100%;padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--tp);outline:none;transition:border-color .2s}
.inp::placeholder{color:var(--tm)}.inp:focus{border-color:var(--gd)}
.sel{padding:8px 9px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.83rem;color:var(--ts);outline:none;cursor:pointer}
.sel option{background:var(--n800)}
.lbl{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ts);margin-bottom:4px}
.spin{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.15);border-top-color:currentColor;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem;color:var(--tm);font-size:.855rem}
.sess-item{display:flex;align-items:center;gap:9px;padding:9px 13px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;margin-bottom:5px;transition:border-color .2s}
.sess-item:hover{border-color:var(--bb)}
.s-del{background:none;border:none;color:var(--tm);cursor:pointer;opacity:0;transition:all .2s;font-size:.82rem}
.sess-item:hover .s-del{opacity:1}.s-del:hover{color:var(--err)}
.timer-hero{background:linear-gradient(135deg,rgba(26,49,96,.5),rgba(12,26,56,.8));border:1px solid var(--bb);border-radius:18px;padding:2.5rem 2rem;text-align:center}
.rbg{fill:none;stroke:var(--n700);stroke-width:7}
.rpr{fill:none;stroke:var(--gold);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .5s ease}
.rtime{font-family:'DM Mono',monospace;font-size:2.5rem;color:var(--gl);letter-spacing:.03em;text-align:center}
.rmode{font-size:.68rem;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;text-align:center}
.note-item{padding:9px 11px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .2s;margin-bottom:4px}
.note-item:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.note-item.active{background:rgba(200,168,75,.08);border-color:var(--bb)}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem}
.chart-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--tp);margin-bottom:.9rem}
.chart-wrap{position:relative;height:190px}
.bar-item{margin-bottom:11px}
.bar-top{display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:3px}
.bar-nm{color:var(--ts)}.bar-vl{color:var(--gl);font-family:'DM Mono',monospace}
.bar-track{height:6px;background:var(--n700);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gd),var(--gold));transition:width 1s ease}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.g2,.g4{grid-template-columns:1fr}}
.note-list-panel{border-right:1px solid var(--border);padding:.9rem;overflow-y:auto;background:rgba(7,15,36,.5)}
</style>
</head>
<body>
<aside class="sidebar">
  <a href="index.html" class="s-logo"><div class="s-mark">S</div><span class="s-name">Scholara</span></a>
  <nav class="s-nav">
    <span class="s-lbl">Overview</span>
    <a href="dashboard.html" class="s-item "><span class="s-icon">🏠</span>Dashboard</a>
<span class="s-lbl">Study Tools</span>
    <a href="tasks.html" class="s-item "><span class="s-icon">✅</span>Tasks</a>
    <a href="tracker.html" class="s-item "><span class="s-icon">📚</span>Study Tracker</a>
    <a href="pomodoro.html" class="s-item "><span class="s-icon">🍅</span>Pomodoro</a>
    <a href="stopwatch.html" class="s-item "><span class="s-icon">⏲️</span>Stopwatch</a>
    <a href="notes.html" class="s-item active"><span class="s-icon">📝</span>Notes</a>
<span class="s-lbl">Insights</span>
    <a href="analytics.html" class="s-item "><span class="s-icon">📊</span>Analytics</a>

  </nav>
  <div class="s-bot">
    <div class="u-card"><div class="u-av" id="uav">?</div><div><div class="u-name" id="uname">...</div><div class="u-email" id="uemail">—</div></div></div>
    <button class="so-btn" id="sobtn">← Sign Out</button>
  </div>
</aside>
<div class="main" style="height:100vh;overflow:hidden">
  <header class="topbar">
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-g btn-sm" onclick="newNote()">+ New</button>
      <button class="btn btn-o btn-sm" onclick="saveNote()">💾 Save</button>
      <button class="btn btn-r btn-sm" onclick="deleteNote()">🗑️ Delete</button>
      <button class="btn btn-t btn-sm" id="ai-btn" onclick="aiGenerate()">🤖 AI Notes</button>
      <span id="ai-status" style="display:none;align-items:center;gap:5px;font-size:.76rem;color:var(--teal)"><span class="spin"></span> AI thinking...</span>
      <span id="save-ok" style="font-size:.7rem;color:var(--ok);opacity:0;transition:opacity .3s;margin-left:4px">✓ Saved</span>
    </div>
    <span class="t-date" id="tdate"></span>
  </header>
  <div style="display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 56px)">
    <div class="note-list-panel">
      <input class="inp" id="nsearch" placeholder="🔍 Search notes..." oninput="searchNotes(this.value)" style="font-size:.8rem;padding:6px 10px;margin-bottom:.7rem"/>
      <div id="nlist"></div>
    </div>
    <div style="display:flex;flex-direction:column;padding:1.5rem;background:var(--n950);overflow-y:auto">
      <div id="n-empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tm);gap:1rem;text-align:center">
        <div style="font-size:3rem;opacity:.35">📝</div>
        <div style="font-size:.9rem">Select a note or create a new one</div>
        <button class="btn btn-g btn-sm" onclick="newNote()">+ New Note</button>
      </div>
      <input id="n-title" placeholder="Note title..." style="display:none;background:none;border:none;outline:none;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--tp);border-bottom:1px solid var(--border);padding-bottom:9px;margin-bottom:11px;width:100%"/>
      <textarea id="n-body" placeholder="Start writing... or click 🤖 AI Notes to generate content." style="display:none;flex:1;background:none;border:none;outline:none;resize:none;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ts);line-height:1.85;min-height:300px"></textarea>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyAX2yhFyqaYdkwD63iEK7fQSw0_mH3yfPQ",
  authDomain: "scholara-f7c60.firebaseapp.com",
  projectId: "scholara-f7c60",
  storageBucket: "scholara-f7c60.firebasestorage.app",
  messagingSenderId: "467753876713",
  appId: "1:467753876713:web:2f0aeb3ce3933e5ace4478"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let uid = null, notes = [], allNotes = [], activeId = null;
document.getElementById('tdate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});

function onUser(user) { uid = user.uid; loadNotes(); }

  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = 'auth.html'; return; }
    const name = user.displayName || user.email.split('@')[0];
    document.getElementById('uname').textContent = name;
    document.getElementById('uemail').textContent = user.email;
    const av = document.getElementById('uav');
    if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}"/>`;
    else av.textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    onUser(user);
  });
  document.getElementById('sobtn').onclick = async () => { await signOut(auth); window.location.href='auth.html'; };

async function loadNotes() {
  const snap = await getDocs(query(collection(db,'users',uid,'notes'), orderBy('updatedAt','desc')));
  allNotes = notes = snap.docs.map(d => ({...d.data(), id:d.id}));
  renderList();
  if (notes.length) selectNote(notes[0].id);
}
function renderList() {
  const el = document.getElementById('nlist');
  if (!notes.length) { el.innerHTML='<div style="font-size:.78rem;color:var(--tm);text-align:center;padding:1rem">No notes yet</div>'; return; }
  el.innerHTML = notes.map(n=>`<div class="note-item ${n.id===activeId?'active':''}" onclick="selectNote('${n.id}')">
    <div style="font-size:.84rem;font-weight:500;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n.title||'Untitled'}</div>
    <div style="font-size:.7rem;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">${n.body?n.body.slice(0,48):'...'}</div>
    <div style="font-size:.62rem;color:var(--tm);margin-top:3px">${n.updatedAt?.toDate?n.updatedAt.toDate().toLocaleDateString('en-IN'):''}</div>
  </div>`).join('');
}
window.selectNote = function(id) {
  activeId = id; const n = notes.find(x=>x.id===id); if (!n) return;
  document.getElementById('n-empty').style.display = 'none';
  document.getElementById('n-title').style.display = 'block';
  document.getElementById('n-body').style.display = 'block';
  document.getElementById('n-title').value = n.title||'';
  document.getElementById('n-body').value = n.body||'';
  renderList();
};
window.newNote = function() {
  activeId = null;
  document.getElementById('n-empty').style.display = 'none';
  document.getElementById('n-title').style.display = 'block';
  document.getElementById('n-body').style.display = 'block';
  document.getElementById('n-title').value = '';
  document.getElementById('n-body').value = '';
  document.getElementById('n-title').focus();
};
window.saveNote = async function() {
  if (!uid) return;
  const title = document.getElementById('n-title').value.trim();
  const body = document.getElementById('n-body').value.trim();
  if (!title && !body) return;
  const data = {title:title||'Untitled', body, updatedAt:serverTimestamp()};
  if (activeId) {
    await updateDoc(doc(db,'users',uid,'notes',activeId), data);
    const idx = allNotes.findIndex(n=>n.id===activeId);
    if (idx!==-1) allNotes[idx] = {...allNotes[idx], ...data, updatedAt:{toDate:()=>new Date()}};
  } else {
    const ref = await addDoc(collection(db,'users',uid,'notes'), {...data, createdAt:serverTimestamp()});
    activeId = ref.id;
    allNotes.unshift({...data, id:ref.id, updatedAt:{toDate:()=>new Date()}});
  }
  notes = [...allNotes]; renderList();
  const si = document.getElementById('save-ok');
  si.style.opacity = '1'; setTimeout(()=>si.style.opacity='0', 2000);
};
window.deleteNote = async function() {
  if (!activeId) return;
  if (!confirm('Delete this note?')) return;
  await deleteDoc(doc(db,'users',uid,'notes',activeId));
  allNotes = allNotes.filter(n=>n.id!==activeId); notes=[...allNotes]; activeId=null;
  document.getElementById('n-title').style.display = 'none';
  document.getElementById('n-body').style.display = 'none';
  document.getElementById('n-empty').style.display = 'flex';
  renderList();
};
window.searchNotes = function(q) {
  notes = q ? allNotes.filter(n=>(n.title||'').toLowerCase().includes(q.toLowerCase())||(n.body||'').toLowerCase().includes(q.toLowerCase())) : allNotes;
  renderList();
};
window.aiGenerate = async function() {
  const title = document.getElementById('n-title').value.trim();
  const body = document.getElementById('n-body').value.trim();
  const topic = title || body;
  if (!topic) { alert('Enter a title or topic first!'); return; }
  document.getElementById('ai-status').style.display = 'flex';
  document.getElementById('ai-btn').disabled = true;
  try {
    const prompt = body
      ? `Expand these notes about "${title}":

${body}

Add more detail, examples, and key points. Use clear headings.`
      : `Generate comprehensive study notes about: "${topic}".

Include key concepts, examples, and a summary. Use clear headings and bullet points.`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    document.getElementById('n-body').value = data.content?.[0]?.text || 'Could not generate notes.';
  } catch(e) { alert('AI generation failed. Try again.'); }
  finally { document.getElementById('ai-status').style.display='none'; document.getElementById('ai-btn').disabled=false; }
};
document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveNote(); } });
</script>
</body></html>
